name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  ES_VERSION: "7.17.27"

jobs:
  # -------------------------------------------------------------------
  # Backend unit tests — run inside Docker
  # -------------------------------------------------------------------
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run backend tests in Docker
        run: >
          docker compose -f docker-compose.test.yml
          build backend-test

      - name: Start Elasticsearch
        run: >
          docker compose -f docker-compose.test.yml
          up -d elasticsearch

      - name: Wait for Elasticsearch to be healthy
        run: |
          timeout 120 bash -c '
            until docker compose -f docker-compose.test.yml exec -T elasticsearch \
              curl -fsSL http://localhost:9200/_cluster/health; do
              sleep 5
            done
          '

      - name: Run backend tests
        run: >
          docker compose -f docker-compose.test.yml
          run --rm backend-test

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # -------------------------------------------------------------------
  # Frontend unit tests — run inside Docker
  # -------------------------------------------------------------------
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run frontend tests in Docker
        run: >
          docker compose -f docker-compose.test.yml
          run --rm frontend-test

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # -------------------------------------------------------------------
  # Docker image build — verify the production image builds cleanly
  # -------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cerebro:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------
  # Smoke test — start the full stack and verify Cerebro responds
  # -------------------------------------------------------------------
  smoke-test:
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start full stack
        run: docker compose up -d --build

      - name: Wait for Cerebro to be healthy
        run: |
          timeout 180 bash -c '
            until curl -fsSL http://localhost:9000/ > /dev/null 2>&1; do
              sleep 5
            done
          '

      - name: Verify Cerebro is serving
        run: curl -fsSL http://localhost:9000/ | head -20

      - name: Verify Elasticsearch connectivity
        run: |
          # Give Cerebro a moment to fully initialize
          sleep 5
          curl -fsSL http://localhost:9200/_cluster/health

      - name: Tear down
        if: always()
        run: docker compose down -v
